<!doctype html>
<html lang="en" class="dark scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Prajoth Kamble — .NET Full Stack Developer with 3.8+ years of experience building scalable enterprise applications and microservices with C#, ASP.NET Core, Web API, Angular and React.js."
    />
    <meta name="author" content="Prajoth Kamble" />
    <meta name="keywords" content="Prajoth Kamble, .NET Full Stack Developer, C#, ASP.NET Core, Web API, Microservices, Entity Framework Core, SQL Server, MongoDB, Angular, React.js, Azure, Docker, Kubernetes, Pune" />
    <meta name="theme-color" content="#0a0c1c" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      // Apply saved theme (or dark default) before React mounts to avoid flash.
      (function () {
        try {
          var stored = localStorage.getItem("portfolio-theme");
          var prefersLight =
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: light)").matches;
          var theme =
            stored === "light" || stored === "dark"
              ? stored
              : prefersLight
              ? "light"
              : "dark";
          document.documentElement.classList.toggle("dark", theme === "dark");
        } catch (e) {}
      })();
    </script>
    <title>Prajoth Kamble — .NET Full Stack Developer</title>
  </head>
  <body class="bg-white text-ink-900 antialiased dark:bg-ink-950 dark:text-ink-50">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
